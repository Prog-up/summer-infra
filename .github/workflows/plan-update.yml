name: Plan update → Discord

# Summarises plan changes. On a pull request it posts a preview comment; on a
# push to main it posts the canonical changelog to Discord. Configure two repo
# secrets:
#   DISCORD_WEBHOOK_URL  — a channel webhook (Server Settings → Integrations)
#   ANTHROPIC_API_KEY    — optional; enables AI summaries instead of a raw diff
on:
  push:
    branches: [main]
    paths:
      - "plan/**.html"
  pull_request:
    paths:
      - "plan/**.html"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write # to post the preview comment on PRs

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diffing)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Summarise plan changes
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For PRs, diff the base..head of the PR; for pushes, before..after.
          BEFORE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          AFTER_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: node scripts/summarize-push.mjs
